name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one in-flight deploy; queue new pushes behind it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      # On CI there's no sibling `../wasmer-js` checkout, so the local
      # pnpm.overrides entry (link:../wasmer-js) would break `pnpm install`.
      # Strip it before installing — CI resolves @joinezco/wasmersdk from
      # npm instead.
      - name: Drop local wasmer-js override
        run: |
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            if (pkg.pnpm && pkg.pnpm.overrides) {
              delete pkg.pnpm.overrides["@joinezco/wasmersdk"];
            }
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
          '

      - run: pnpm install --no-frozen-lockfile

      # User/org pages (repo named `<owner>.github.io`) serve at the root `/`;
      # project pages (any other repo) serve at `/<repo-name>/`. Vite's `base`
      # has to match, or built asset URLs 404 and the page serves raw source.
      - name: Compute vite base
        id: vitebase
        run: |
          name="${{ github.event.repository.name }}"
          if [[ "$name" == *.github.io ]]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/$name/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with vite
        run: pnpm build
        env:
          VITE_BASE: ${{ steps.vitebase.outputs.base }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
