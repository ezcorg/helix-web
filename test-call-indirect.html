<!DOCTYPE html>
<html>
<head><title>Cross-instance call_indirect test</title></head>
<body>
<pre id="log"></pre>
<script>
const log = (msg) => { document.getElementById('log').textContent += msg + '\n'; console.log(msg); };

async function test() {
    log('=== Cross-instance call_indirect test ===\n');

    // Fetch pre-compiled modules
    const [aBytes, bBytes] = await Promise.all([
        fetch('/test-a.wasm').then(r => r.arrayBuffer()),
        fetch('/test-b.wasm').then(r => r.arrayBuffer()),
    ]);

    // Module B: exports get99() -> i32
    log('Instantiating Module B...');
    const modB = new WebAssembly.Module(bBytes);
    const instB = new WebAssembly.Instance(modB);
    log('  B.get99() = ' + instB.exports.get99());

    // Create a shared table for Module A
    const table = new WebAssembly.Table({initial: 10, maximum: 1000, element: 'anyfunc'});

    // Module A: imports table, exports call_fn(idx) which does call_indirect
    log('\nInstantiating Module A with shared table...');
    const modA = new WebAssembly.Module(aBytes);
    const instA = new WebAssembly.Instance(modA, {
        env: { __indirect_function_table: table }
    });
    log('  A.local42() = ' + instA.exports.local42());

    // Test 1: Same-instance call_indirect
    log('\n--- Test 1: Same-instance call_indirect ---');
    // Put A's local42 in the table
    table.set(1, instA.exports.local42);
    try {
        const r = instA.exports.call_fn(1);
        log('  call_fn(1) [A.local42] = ' + r + (r === 42 ? ' ✅' : ' ❌'));
    } catch(e) {
        log('  call_fn(1) FAILED: ' + e.message + ' ❌');
    }

    // Test 2: Cross-instance call_indirect
    log('\n--- Test 2: Cross-instance call_indirect ---');
    table.set(2, instB.exports.get99);
    try {
        const r = instA.exports.call_fn(2);
        log('  call_fn(2) [B.get99] = ' + r + (r === 99 ? ' ✅' : ' ❌'));
    } catch(e) {
        log('  call_fn(2) FAILED: ' + e.message + ' ❌');
    }

    // Test 3: After table.grow
    log('\n--- Test 3: Table.grow + cross-instance ---');
    const prevLen = table.length;
    table.grow(5);
    log('  Table grew from ' + prevLen + ' to ' + table.length);
    table.set(prevLen, instB.exports.get99);
    try {
        const r = instA.exports.call_fn(prevLen);
        log('  call_fn(' + prevLen + ') [B.get99 after grow] = ' + r + (r === 99 ? ' ✅' : ' ❌'));
    } catch(e) {
        log('  call_fn(' + prevLen + ') FAILED: ' + e.message + ' ❌');
    }

    // Test 4: PIC module (grammar-like) with shared table
    log('\n--- Test 4: Grammar-like PIC module ---');
    const grammarBytes = await fetch('/grammars/json.wasm').then(r => r.arrayBuffer());
    const grammarMod = new WebAssembly.Module(grammarBytes);
    log('  Grammar imports: ' + WebAssembly.Module.imports(grammarMod).map(i => i.module+':'+i.name).join(', '));

    const mem = new WebAssembly.Memory({initial: 1024, maximum: 65536, shared: true});
    const grammarInst = new WebAssembly.Instance(grammarMod, {
        env: {
            memory: mem,
            __indirect_function_table: table,
            __memory_base: new WebAssembly.Global({value: 'i32', mutable: false}, 0),
            __table_base: new WebAssembly.Global({value: 'i32', mutable: false}, prevLen + 1),
        }
    });

    if (grammarInst.exports.__wasm_apply_data_relocs) {
        grammarInst.exports.__wasm_apply_data_relocs();
    }
    if (grammarInst.exports.__wasm_call_ctors) {
        grammarInst.exports.__wasm_call_ctors();
    }

    const ptr = grammarInst.exports.tree_sitter_json();
    log('  tree_sitter_json() = ' + ptr);
    const view = new DataView(mem.buffer);
    const version = view.getUint32(ptr, true);
    log('  ABI version at ptr = ' + version);

    // Put tree_sitter_json in the table
    const tsIdx = table.length;
    table.grow(1);
    table.set(tsIdx, grammarInst.exports.tree_sitter_json);
    log('  Placed tree_sitter_json at table[' + tsIdx + ']');

    // Call via call_indirect from Module A
    try {
        const r = instA.exports.call_fn(tsIdx);
        log('  call_fn(' + tsIdx + ') [tree_sitter_json via call_indirect] = ' + r + ' ✅');
    } catch(e) {
        log('  call_fn(' + tsIdx + ') FAILED: ' + e.message + ' ❌');
    }

    log('\n=== Test complete ===');
}

test().catch(e => log('ERROR: ' + e.stack));
</script>
</body>
</html>
