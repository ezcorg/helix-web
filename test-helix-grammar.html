<!DOCTYPE html>
<html>
<head><title>Helix + Grammar direct test</title></head>
<body>
<pre id="log"></pre>
<script>
const log = (msg) => { document.getElementById('log').textContent += msg + '\n'; console.log(msg); };

async function test() {
    log('=== Direct helix + grammar table test ===\n');

    // Load JSON grammar
    const grammarBytes = await fetch('/grammars/json.wasm').then(r => r.arrayBuffer());
    const grammarMod = new WebAssembly.Module(grammarBytes);

    // Create shared memory and table (like helix would have)
    const mem = new WebAssembly.Memory({initial: 1024, maximum: 65536, shared: true});
    const table = new WebAssembly.Table({initial: 9046, maximum: 100000, element: 'anyfunc'});
    log('Table initial size: ' + table.length);

    // Grow table for grammar (1 entry from dylink.0)
    const tableBase = table.length;
    table.grow(1);
    log('Table after grow: ' + table.length + ' (table_base=' + tableBase + ')');

    // Grow memory for grammar data
    const memBase = mem.buffer.byteLength;
    mem.grow(17); // ~1MB for grammar data
    log('Memory base: ' + memBase + ' (' + (memBase/1024/1024).toFixed(1) + 'MB)');

    // Instantiate grammar with PIC imports
    log('\nInstantiating grammar...');
    const grammarInst = new WebAssembly.Instance(grammarMod, {
        env: {
            memory: mem,
            __indirect_function_table: table,
            __memory_base: new WebAssembly.Global({value: 'i32', mutable: false}, memBase),
            __table_base: new WebAssembly.Global({value: 'i32', mutable: false}, tableBase),
        }
    });

    // Run init functions
    if (grammarInst.exports.__wasm_apply_data_relocs) {
        grammarInst.exports.__wasm_apply_data_relocs();
        log('  __wasm_apply_data_relocs OK');
    }
    if (grammarInst.exports.__wasm_call_ctors) {
        grammarInst.exports.__wasm_call_ctors();
        log('  __wasm_call_ctors OK');
    }

    // Call tree_sitter_json directly
    const ptr = grammarInst.exports.tree_sitter_json();
    log('  tree_sitter_json() = ' + ptr);
    const view = new DataView(mem.buffer);
    const version = view.getUint32(ptr, true);
    log('  ABI version: ' + version);

    // Check table entries
    log('\n  Table[' + tableBase + '] = ' + (table.get(tableBase) ? 'function' : 'null'));

    // Read lex_fn from TSLanguage struct (word 23 = offset 92)
    const lexFn = view.getUint32(ptr + 92, true);
    log('  lex_fn (from struct) = ' + lexFn);
    log('  Table[' + lexFn + '] = ' + (table.get(lexFn) ? 'function' : 'null'));

    // Place tree_sitter_json in table for dlsym
    const tsIdx = table.length;
    table.grow(1);
    table.set(tsIdx, grammarInst.exports.tree_sitter_json);
    log('\n  tree_sitter_json at table[' + tsIdx + ']');

    // Now create a WASM module that calls call_indirect on these indices
    // We'll use Module A from the previous test
    const aBytes = await fetch('/test-a.wasm').then(r => r.arrayBuffer());
    const aMod = new WebAssembly.Module(aBytes);
    const aInst = new WebAssembly.Instance(aMod, {
        env: { __indirect_function_table: table }
    });

    // Test: call tree_sitter_json via call_indirect
    try {
        const r = aInst.exports.call_fn(tsIdx);
        log('  call_fn(' + tsIdx + ') = ' + r + (r === ptr ? ' ✅ matches direct call!' : ' ❌'));
    } catch(e) {
        log('  call_fn(' + tsIdx + ') FAILED: ' + e.message + ' ❌');
    }

    // Test: call ts_lex via call_indirect (will crash because no valid lexer, but type check should pass)
    if (table.get(lexFn)) {
        try {
            aInst.exports.call_fn(lexFn); // This expects () -> i32 but ts_lex is (i32,i32) -> i32
            log('  call_fn(' + lexFn + ') [ts_lex] = unexpected success');
        } catch(e) {
            if (e.message.includes('signature') || e.message.includes('mismatch')) {
                log('  call_fn(' + lexFn + ') [ts_lex] = type mismatch (EXPECTED - different signature) ✅');
            } else {
                log('  call_fn(' + lexFn + ') [ts_lex] = ' + e.message);
            }
        }
    } else {
        log('  ts_lex NOT in table at index ' + lexFn + ' ❌');
    }

    log('\n=== Test complete ===');
}

test().catch(e => log('ERROR: ' + e.stack));
</script>
</body>
</html>
